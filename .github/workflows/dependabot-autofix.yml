name: Generated Artifact Drift Check

on:
  pull_request:
    branches:
      - main
      - dev
      - stage

permissions:
  contents: read

jobs:
  validate-generated-artifacts:
    runs-on: macos-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup FVM
        uses: kuhnroyal/flutter-fvm-config-action/config@c378498f1d1962d33039c3989411093ef8a17b2c
        id: fvm-config-action

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: 🔗 Create FVM symlink for CI
        run: |
          mkdir -p .fvm
          ln -sfn "$FLUTTER_ROOT" .fvm/flutter_sdk

      - name: 🏗️ Melos Bootstrap
        uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: 7.4.0
          run-bootstrap: true

      - name: 🛠️ Generate Code
        run: melos run generate --no-select

      - name: 📦 Check for generated artifact drift
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated artifacts are out of date. Run 'fvm dart run melos bootstrap' and 'fvm dart run melos run generate', then commit the resulting changes."
            git diff --name-only
            git diff --stat
            git diff --exit-code
          fi
