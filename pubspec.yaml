name: auravibes_workspace
publish_to: none
environment:
  sdk: ^3.12.0

workspace:
  - apps/auravibes_app
  - packages/auravibes_genkit_providers
  - packages/auravibes_ui
  - widgetbook

dev_dependencies:
  dart_code_linter: ^4.1.5
  dependency_validator: ^5.0.4
  import_sorter: ^4.6.0
  melos: ^7.8.1
  riverpod_lint: 3.1.4
  very_good_analysis: ^10.2.0

melos:
  sdkPath: .fvm/flutter_sdk
  categories:
    app:
      - "apps/**"
    packages:
      - "packages/**"
  command:
    bootstrap:
      runPubGetInParallel: false
      environment:
        sdk: ^3.12.0
  scripts:
    analyze:
      run: dart analyze

    analyze:fix:
      run: dart fix --apply

    unused:files:
      run: dart run dart_code_linter:metrics check-unused-files --monorepo --exclude='{**/*.g.dart,**/*.freezed.dart,**/.dart_tool/**.dart,packages/auravibes_genkit_providers/lib/auravibes_genkit_providers.dart,packages/auravibes_genkit_providers/lib/src/openai_codex.dart,packages/auravibes_genkit_providers/lib/src/openai_compat_reasoning.dart,packages/auravibes_genkit_providers/lib/src/openrouter.dart,packages/auravibes_genkit_providers/lib/src/chat_completions_provider.dart}' apps/auravibes_app/lib packages/auravibes_genkit_providers/lib packages/auravibes_ui/lib
      description: Fail when unused Dart files are detected

    dcl:analyze:
      run: dart run dart_code_linter:metrics analyze apps/auravibes_app/lib apps/auravibes_app/test packages/auravibes_genkit_providers/lib packages/auravibes_genkit_providers/test packages/auravibes_ui/lib packages/auravibes_ui/test widgetbook/lib --set-exit-on-violation-level=noted
      description: Run legacy Dart Code Linter rule analysis manually

    unused:code:
      run: dart run dart_code_linter:metrics check-unused-code --monorepo apps/auravibes_app/lib packages/auravibes_genkit_providers/lib packages/auravibes_ui/lib
      description: Fail when production unused declarations are detected

    unnecessary:nullable:
      # Excluded callbacks/entities use null as behavior: fallback close flow,
      # Flutter-style disabled icon buttons, and patch fields.
      run: dart run dart_code_linter:metrics check-unnecessary-nullable --monorepo --exclude='{apps/auravibes_app/lib/domain/entities/conversation_entity.dart,apps/auravibes_app/lib/features/models/widgets/add_model_provider_widget.dart,packages/auravibes_ui/lib/src/atoms/aura_icon.dart}' apps/auravibes_app/lib packages/auravibes_genkit_providers/lib packages/auravibes_ui/lib
      description: Fail when unnecessary nullable parameters are detected

    format:check:
      run: dart format --line-length 80 -o none --set-exit-if-changed .
      description: Check code formating

    format:fix:
      run: dart format --line-length 80 .
      description: Fix code formatting

    # Testing Scripts
    test:
      exec: flutter test --reporter=compact
      packageFilters:
        dirExists: test
      description: Run tests for all packages (fast, no coverage)

    test:coverage:
      exec: flutter test --coverage --reporter=compact
      packageFilters:
        dirExists: test
      description: Run tests for all packages with coverage

    test:ci:
      exec: flutter test --coverage --concurrency=2 --timeout=30s --reporter=compact
      packageFilters:
        dirExists: test
      description: Run tests in CI mode (coverage + optimized settings)

    # Code Generation Scripts
    generate:
      exec: dart run build_runner build --delete-conflicting-outputs
      description: Run code generation for all packages
      packageFilters:
        dependsOn: build_runner

    generate:watch:
      exec: dart run build_runner watch --delete-conflicting-outputs
      description: Run code generation in watch mode
      packageFilters:
        dependsOn: build_runner
      concurrency: 10

    generate:localization:
      # Run build_runner and format only the generated files
      exec: dart pub run easy_localization:generate -S assets/i18n -f keys -O lib/i18n -o locale_keys.dart --skip-unnecessary-keys && dart format lib/i18n/locale_keys.dart
      concurrency: 1
      orderDependents: true
      failFast: true
      packageFilters:
        dependsOn:
          - easy_localization

    clean:
      run: melos exec -- "flutter clean"
      description: Clean all packages

    # Validation Pipeline (for CI)
    validate:
      run: |
        melos analyze &&
        melos run unused:files &&
        melos run unused:code &&
        melos run unnecessary:nullable &&
        melos run format:check &&
        melos run test
      description: Full validation pipeline (no coverage, fast)

    validate:ci:
      run: |
        melos analyze &&
        melos run unused:files &&
        melos run unused:code &&
        melos run unnecessary:nullable &&
        melos run format:check &&
        melos run test:ci
      description: Validation pipeline with coverage (CI mode)

    validate:quick:
      run: |
        melos analyze &&
        melos run unused:files &&
        melos run unused:code &&
        melos run unnecessary:nullable &&
        melos run format:check
      description: Quick validation for development

    # Development Scripts
    outdated:
      run: flutter pub outdated
      description: Check for outdated dependencies

    upgrade:
      run: flutter pub upgrade
      description: Upgrade dependencies

    # Maintenance Scripts
    reset:
      description: Reset and regenerate all packages
      steps:
        - melos clean
        - melos bootstrap
        - melos run generate

    generate:flavors:
      exec: dart pub run flutter_flavorizr -f
      concurrency: 1
      orderDependents: true
      failFast: true
      packageFilters:
        dependsOn:
          - flutter_flavorizr

    generate:icons:
      exec: dart pub run flutter_launcher_icons
      concurrency: 1
      orderDependents: true
      failFast: true
      packageFilters:
        dependsOn:
          - flutter_launcher_icons
