# Worktrunk configuration
# https://worktrunk.dev/

[[pre-start]]
# Copy selected gitignored caches from the primary worktree before setup.
copy = "wt step copy-ignored"

[[pre-start]]
# Install the FVM Flutter version configured in .fvmrc
fvm = "fvm install && fvm use"

[[pre-start]]
# Get root dependencies first, then bootstrap melos packages
bootstrap = "fvm dart pub get && fvm dart run melos bootstrap"

[[pre-start]]
# Run code generation directly via melos exec to avoid the nested melos run path
generate = "fvm dart run melos exec --depends-on=build_runner -- \"dart run build_runner build --delete-conflicting-outputs\""
