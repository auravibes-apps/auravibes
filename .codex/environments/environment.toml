# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "AuraVibes Flutter"

[setup]
script = '''
set -euo pipefail

if ! command -v fvm >/dev/null 2>&1; then
  if ! command -v dart >/dev/null 2>&1; then
    echo "FVM is required, but neither fvm nor dart is available on PATH."
    exit 1
  fi

  dart pub global activate fvm
  export PATH="$PATH:$HOME/.pub-cache/bin"
fi


fvm use
fvm dart pub get
fvm dart run melos bootstrap
'''

[[actions]]
name = "Bootstrap"
icon = "tool"
command = "fvm dart pub get && fvm dart run melos bootstrap"

[[actions]]
name = "Generate Code"
icon = "tool"
command = "fvm dart run melos run generate"

[[actions]]
name = "Analyze"
icon = "debug"
command = "fvm dart run melos run analyze"

[[actions]]
name = "Format Check"
icon = "tool"
command = "fvm dart run melos run format:check"

[[actions]]
name = "Test"
icon = "test"
command = "fvm dart run melos run test"
