version = 1
name = "AuraVibes Flutter"

[setup]
script = '''
set -euo pipefail

if ! command -v fvm >/dev/null 2>&1; then
  if ! command -v dart >/dev/null 2>&1; then
    echo "FVM is required, but neither fvm nor dart is available on PATH."
    exit 1
  fi

  dart pub global activate fvm
  export PATH="$PATH:$HOME/.pub-cache/bin"
fi

FLUTTER_VERSION=$(sed -n 's/.*"flutter"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .fvmrc | head -n 1)
if [ -z "$FLUTTER_VERSION" ]; then
  echo "Unable to read Flutter version from .fvmrc."
  exit 1
fi

fvm install "$FLUTTER_VERSION"
fvm use "$FLUTTER_VERSION" --force --skip-pub-get
fvm flutter --version

fvm dart pub get
fvm dart run melos bootstrap
fvm dart run melos exec --depends-on=build_runner -- "dart run build_runner build --delete-conflicting-outputs"
'''

[[actions]]
name = "Bootstrap"
icon = "tool"
command = "fvm dart pub get && fvm dart run melos bootstrap"

[[actions]]
name = "Generate Code"
icon = "tool"
command = "fvm dart run melos exec --depends-on=build_runner -- \"dart run build_runner build --delete-conflicting-outputs\""

[[actions]]
name = "Analyze"
icon = "debug"
command = "fvm dart run melos analyze"

[[actions]]
name = "Format Check"
icon = "tool"
command = "fvm dart run melos run format:check"

[[actions]]
name = "Test"
icon = "test"
command = "fvm dart run melos run test"
