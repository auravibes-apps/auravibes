reusables:
  - &release_tag
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "^auravibes_app-v([0-9]+)\\.([0-9]+)\\.([0-9]+)(-beta\\.[0-9]+)?$"
          include: true
scripts:
  - &script_setup_environment
    name: Setup Environment
    script: |
      mkdir -p .fvm
      ln -sfn "$FLUTTER_ROOT" .fvm/flutter_sdk
      echo PATH="$PATH":"$FLUTTER_ROOT/.pub-cache/bin" >> $CM_ENV
      echo PATH="$PATH":"$FLUTTER_ROOT/bin" >> $CM_ENV

  - &script_install_melos
    name: Install Melos
    script: |
      dart pub global activate melos

  - &script_melos_bootstrap
    name: Bootstrap Monorepo
    script: |
      echo "Bootstrapping monorepo packages..."
      melos bootstrap --verbose

  - &script_generate_code
    name: Generate
    script: |
      echo "Running generations..."
      melos run generate
      melos run generate:localization

  - &script_parse_tag
    name: Parse Tag and Set Environment
    script: |
      RELEASE_TAG=${CM_TAG:-}

      if [ -z "$RELEASE_TAG" ]; then
        git fetch --tags --force
        RELEASE_TAG=$(git tag --points-at HEAD --list 'auravibes_app-v*' | tail -n 1)
      fi

      if [ -z "$RELEASE_TAG" ]; then
        RELEASE_TAG=$(git describe --tags --match 'auravibes_app-v*' --abbrev=0 2>/dev/null || true)
      fi

      if [ -n "$RELEASE_TAG" ]; then
        TAG_VERSION=${RELEASE_TAG##*-v}
      else
        TAG_VERSION=$(grep '^version:' apps/auravibes_app/pubspec.yaml | awk '{print $2}')
      fi

      echo "Release tag: $RELEASE_TAG"

      if [[ $TAG_VERSION == *"-beta"* ]]; then
        FLAVOR="beta"
      else
        FLAVOR="prod"
      fi

      # Extract version from tag (1.2.3 or 1.2.3-beta.1)
      VERSION=${TAG_VERSION%%-*}
      VERSION=${VERSION%%+*}
      echo "Version: $VERSION"

      # Set environment variables for build
      echo "BUILD_NAME=$VERSION" >> $CM_ENV

      # Set automatic build number
      echo "BUILD_NUMBER=$PROJECT_BUILD_NUMBER" >> $CM_ENV
      echo "FLAVOR=$FLAVOR" >> $CM_ENV
      echo "RELEASE_TAG=$RELEASE_TAG" >> $CM_ENV

workflows:
  # iOS Release Workflow
  release-ios:
    name: Release iOS
    <<: *release_tag
    environment:
      flutter: fvm
      groups:
        - github
      ios_signing:
        distribution_type: app_store
        bundle_identifier: me.auravibes.app
    integrations:
      app_store_connect: app_store_connect
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FLUTTER_ROOT/.pub-cache
        - ~/.pub-cache/hosted

    scripts:
      - *script_setup_environment
      - *script_install_melos
      - *script_melos_bootstrap
      - *script_generate_code
      - *script_parse_tag

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA with Obfuscation and Split Debug Info
        script: |
          echo "Building iOS IPA..."
          echo "Build Name: $BUILD_NAME"
          echo "Build Number: $BUILD_NUMBER"
          echo "Flavor: $FLAVOR"

          cd apps/auravibes_app

          flutter build ipa --release \
            --flavor=$FLAVOR \
            --build-name=$BUILD_NAME \
            --build-number=$BUILD_NUMBER \
            --obfuscate \
            --export-options-plist=/Users/builder/export_options.plist \
            --split-debug-info=./ios/symbols

    artifacts:
      - apps/auravibes_app/build/ios/ipa/*.ipa
      - apps/auravibes_app/ios/symbols/**
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

      scripts:
        - name: Publish iOS artifacts to GitHub Release
          script: |
            if [ -z "${RELEASE_TAG}" ]; then
              echo "Not a tag build, will not publish to GitHub release"
              exit 0
            fi
            export GH_TOKEN=${GH_TOKEN:-${GITHUB_TOKEN:-}}
            cd apps/auravibes_app
            gh release upload "${RELEASE_TAG}" build/ios/ipa/*.ipa --clobber

  # Android Release Workflow
  release-android:
    name: Release Android
    <<: *release_tag
    environment:
      flutter: fvm
      android_signing:
        - auravibes_keystore
      groups:
        - google_play
        - github
      vars:
        PACKAGE_NAME: "me.auravibes.app"
        GOOGLE_PLAY_TRACK: internal
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/cache
    scripts:
      - *script_setup_environment
      - *script_install_melos
      - *script_melos_bootstrap
      - *script_generate_code
      - *script_parse_tag

      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/apps/auravibes_app/android/local.properties"

      - name: Build Android AAB with Obfuscation and Split Debug Info
        script: |
          echo "Building Android AAB..."
          echo "Build Name: $BUILD_NAME"
          echo "Build Number: $BUILD_NUMBER"
          echo "Flavor: $FLAVOR"
          echo "Package Name: $PACKAGE_NAME"
          echo "Track: $GOOGLE_PLAY_TRACK"

          cd apps/auravibes_app


          flutter build appbundle \
            --release \
            --flavor=$FLAVOR \
            --build-name=$BUILD_NAME \
            --build-number=$BUILD_NUMBER \
            --obfuscate \
            --split-debug-info=./android/symbols

    artifacts:
      - apps/auravibes_app/build/**/outputs/**/*.aab
      - apps/auravibes_app/build/**/outputs/**/mapping.txt
      - apps/auravibes_app/android/symbols/**
      - flutter_drive.log

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: true

      scripts:
        - name: Publish Android artifacts to GitHub Release
          script: |
            if [ -z "${RELEASE_TAG}" ]; then
              echo "Not a tag build, will not publish to GitHub release"
              exit 0
            fi
            export GH_TOKEN=${GH_TOKEN:-${GITHUB_TOKEN:-}}
            cd apps/auravibes_app
            gh release upload "${RELEASE_TAG}" build/app/outputs/bundle/**/*.aab --clobber
