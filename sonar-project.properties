sonar.projectKey=auravibes-apps_auravibes
sonar.organization=auravibes-apps
sonar.projectName=auravibes
sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages,widgetbook
sonar.tests=apps,packages,widgetbook

sonar.inclusions=**/*.dart
sonar.test.inclusions=**/test/**,**/integration_test/**,**/*_test.dart

sonar.exclusions=**/drift_worker.js,.specify/scripts/**,**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/test/**,**/integration_test/**,**/*_test.dart
sonar.coverage.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/drift_worker.js,.specify/scripts/**,apps/auravibes_app/lib/main.dart,widgetbook/**
sonar.cpd.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/drift_worker.js
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=dart:S7124
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.dart

sonar.dart.lcov.reportPaths=**/coverage/lcov.info

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600
