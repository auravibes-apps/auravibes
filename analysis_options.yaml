include: package:very_good_analysis/analysis_options.yaml

plugins:
  riverpod_lint:
    version: 3.1.4-dev.3
    diagnostics:
      async_value_nullable_pattern: true
      avoid_build_context_in_providers: true
      avoid_keep_alive_dependency_inside_auto_dispose: true
      avoid_public_notifier_properties: true
      avoid_ref_inside_state_dispose: true
      functional_ref: true
      missing_provider_scope: true
      notifier_build: true
      notifier_extends: true
      only_use_keep_alive_inside_keep_alive: true
      protected_notifier_properties: true
      provider_dependencies: true
      provider_parameters: true
      riverpod_syntax_error: true
      scoped_providers_should_specify_dependencies: true
      unsupported_provider_value: true

formatter:
  page_width: 80

analyzer:
  enable-experiment:
    - private-named-parameters

  exclude:
    - "**/**.g.dart"
    - "lib/**.g.dart"
    - "**/**.freezed.dart"
    - "lib/**.freezed.dart"
    - "lib/i18n/*"
    - "build/**"
    - "lib/generated/**"

  language:
    #strict-casts: true
    #strict-inference: true
    #strict-raw-types: true

  errors:
    todo: ignore
    always_use_package_imports: warning
    avoid_print: warning
    annotate_overrides: warning
    avoid_renaming_method_parameters: warning
    avoid_return_types_on_setters: warning
    avoid_returning_null_for_void: error
    avoid_unnecessary_containers: warning
    camel_case_types: error
    flutter_style_todos: warning
    invalid_annotation_target: ignore
    always_declare_return_types: warning
    unused_import: error
    require_trailing_commas: info
    sort_child_properties_last: ignore
    no_leading_underscores_for_local_identifiers: info
    use_string_in_part_of_directives: ignore

linter:
  rules:
    always_use_package_imports: true
    avoid_print: true
    annotate_overrides: true
    avoid_renaming_method_parameters: true
    avoid_return_types_on_setters: true
    avoid_returning_null_for_void: true
    avoid_unnecessary_containers: true
    camel_case_types: true
    always_declare_return_types: true
    require_trailing_commas: true
    sort_child_properties_last: false
    library_private_types_in_public_api: false
    no_leading_underscores_for_local_identifiers: false
    depend_on_referenced_packages: false
    remove_deprecations_in_breaking_versions: true
    unnecessary_unawaited: true
    ##
    flutter_style_todos: false
    discarded_futures: false

dart_code_linter:
  extends:
    - package:dart_code_linter/presets/all.yaml

  rules:
    - avoid-double-slash-imports
    - avoid-duplicate-exports
    - avoid-border-all
    - avoid-expanded-as-spacer
    - avoid-unnecessary-conditionals
    - binary-expression-operand-order
    - correct-game-instantiating
    - double-literal-format
    - no-boolean-literal-compare
    - only-barrel-import
    - prefer-correct-edge-insets-constructor
    - prefer-first-or-null
    - prefer-intl-name
    - prefer-match-file-name:
        exclude:
          - test/**
          - "**/test/**"
          - "**/*.g.dart"
          - "**/*.freezed.dart"
          - "**/atoms.dart"
          - "**/molecules.dart"
          - "**/organisms.dart"
          - "**/tokens.dart"
          - "**/ui.dart"
          - widgetbook/lib/aura_ui/**
          - widgetbook/lib/knobs/**
          - lib/aura_ui/**
          - lib/knobs/**
          - main.dart
          - "**/main.dart"
          - apps/auravibes_app/lib/main.dart
          - apps/auravibes_app/lib/i18n/**
          - apps/auravibes_app/web/**
    - prefer-first
    - prefer-immediate-return
    - prefer-iterable-of
    - prefer-last
    - prefer-media-query-direct-access
    - prefer-named-record-fields
    - prefer-single-quotes
    - prefer-trailing-comma
    - tag-name

    # Disabled: enabling the full DCL preset on the existing codebase surfaces
    # thousands of style-only changes across production, tests, and widgetbook.
    - prefer-correct-type-name: false
    - prefer-enums-by-name: false
    - prefer-extracting-callbacks: false
    - prefer-moving-to-variable: false
    - prefer-single-widget-per-file: false
    - prefer-static-class: false
